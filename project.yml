name: ComicReader
options:
  bundleIdPrefix: de.wiredframe
  deploymentTarget:
    # iOS 26: the app adopts Liquid Glass rather than straddling two design languages.
    # Building against the iOS 26 SDK already gave every system control the glass look while
    # the hand-rolled chrome stayed on iOS 18 materials — the deployment target is what lets
    # that chrome catch up (native TabView, .glassEffect) without `if #available` everywhere.
    iOS: "26.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.40.0"

packages:
  # CBZ (ZIP) reading — pure-Swift, added via SPM.
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.19"

# Explicit shared scheme so `xcodebuild -scheme ComicReader` always works after a
# regenerate (otherwise it only exists as an auto-created per-user scheme).
schemes:
  ComicReader:
    build:
      targets:
        ComicReader: all
        ComicReaderTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ComicReaderTests
    archive:
      config: Release

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Patch for fixes and additions; minor only when a release stops installing on a phone it
    # used to — 1.2.0 was that one (iOS 26), and the version is the only place anyone would
    # learn it. Bump this, tag v<version>, and CI builds and publishes the .ipa.
    MARKETING_VERSION: "1.3.7"
    # Distributed via GitHub Releases (sideload), not the App Store, so the build
    # number is cosmetic — bump it with each tagged release if you like.
    CURRENT_PROJECT_VERSION: "18"
    # Signing here is only for building onto your OWN device from Xcode — Xcode manages the
    # Apple Development certificate and profile (the account must be added in Xcode →
    # Settings → Accounts), and simulator builds need no profile at all. NOT for shipping:
    # the released .ipa is archived unsigned (build-ipa.sh passes CODE_SIGNING_ALLOWED=NO)
    # and the nightly device refresh passes its own team on the command line, so neither
    # path reads these two.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "7RN999S858"
    # Link the Core Image Metal kernel library as CI kernels.
    MTLLINKER_FLAGS: "-cikernel"

targets:
  ComicReader:
    type: application
    platform: iOS
    dependencies:
      - package: ZIPFoundation
      # Embeds the QuickLook thumbnail extension into the app's PlugIns/ (XcodeGen
      # embeds app-extension dependencies by default), so it ships and registers
      # with the app — no separate install step, and build-ipa.sh picks it up for free.
      - target: ComicThumbnail
    sources:
      # App sources. The Metal kernel needs a per-file flag (below), so it is
      # excluded here. Info.plist is the target's INFOPLIST_FILE, not a resource —
      # excluded so it isn't also copied into the bundle as a stray file.
      - path: ComicReader
        excludes:
          - "PaperEffect/PaperKernels.metal"
          - "Info.plist"
      # The Core Image Metal kernel is compiled with -fcikernel.
      - path: ComicReader/PaperEffect/PaperKernels.metal
        compilerFlags: "-fcikernel"
      # App icon — Icon Composer (.icon) file, referenced directly from the source
      # folder so re-exports are picked up automatically. Compiled by actool via
      # ASSETCATALOG_COMPILER_APPICON_NAME below. `type: file` keeps the bundle a
      # single reference instead of a recursed group.
      - path: AppIcon/AppIcon.icon
        type: file
        buildPhase: resources
      # The four bundled demo comics (see SampleLibrary), copied into the app so a fresh
      # install seeds a populated library. A normal resources group (files flattened into the
      # bundle), NOT a folder reference — SampleLibrary looks each up by name via
      # Bundle.main.url(forResource:withExtension:).
      - path: DemoComics
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.wiredframe.comicreader
        # Keys with no INFOPLIST_KEY_ build-setting form (the CBZ file association,
        # ProMotion, export compliance) live in Info.plist. GENERATE_INFOPLIST_FILE merges
        # the INFOPLIST_KEY_* settings below into that file rather than replacing it, so
        # both halves survive.
        #
        # Don't move those keys back into a post-build `plutil` script: ProcessInfoPlistFile
        # is not ordered against shell script phases, and on the device build it runs last
        # and silently overwrites the patches — which ships an app whose comics can't be
        # opened from Files at all.
        INFOPLIST_FILE: ComicReader/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Paper Comic"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"

  # QuickLook thumbnail extension — draws a CBZ's cover in Files, Spotlight and
  # "Recents" for our exported cbz UTI. Shares the archive-reading and downsampling
  # code with the app by compiling the same two source files into this target too,
  # rather than adding a shared framework — two small files don't earn the extra
  # bundle and its signing surface. Version/team/signing are inherited from
  # settings.base, so the appex stays in lockstep with the app.
  ComicThumbnail:
    type: app-extension
    platform: iOS
    dependencies:
      - package: ZIPFoundation
    sources:
      - path: ComicThumbnail
      - path: ComicReader/Archive/ComicArchive.swift
      - path: ComicReader/Model/ImageDownsampler.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.wiredframe.comicreader.thumbnail
        INFOPLIST_FILE: ComicThumbnail/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Comic Thumbnails"
        TARGETED_DEVICE_FAMILY: "1,2"

  # Unit tests for the library-stability invariants — above all that a bookmark can never be
  # lost by removing a download (only a full delete clears them). Hosted by the app so
  # `@testable import ComicReader` can reach the models and Importer. Local-only: it never ships
  # in the sideloaded .ipa (build-ipa.sh archives the ComicReader target alone).
  ComicReaderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ComicReaderTests
    dependencies:
      - target: ComicReader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.wiredframe.comicreadertests
        GENERATE_INFOPLIST_FILE: YES
