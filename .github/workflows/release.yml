name: Release IPA

# Build an unsigned .ipa and attach it to a GitHub Release whenever a v* tag is pushed.
# Trigger manually from the Actions tab too (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select newest installed Xcode
        run: |
          sudo xcode-select -switch "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      # The paper effect uses a Core Image Metal kernel; Xcode 26 fetches its toolchain
      # on demand. Tolerated if the command/toolchain isn't applicable on the runner.
      - name: Download Metal toolchain
        run: xcodebuild -downloadComponent MetalToolchain || echo "skipped"

      - name: Build unsigned .ipa
        run: ./scripts/build-ipa.sh

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/PaperComicReader-*.ipa
          # Append an auto-generated changelog (commits since the previous tag) below the
          # sideloading note, so every release carries "what changed" without hand-editing.
          generate_release_notes: true
          body: |
            Unsigned `.ipa` for sideloading (AltStore / Sideloadly / TrollStore).

            **Requires iOS 26 or later.** On anything older the install fails with an
            unhelpful error rather than saying why.

            iOS can't install this directly — see the README for how to sideload it and
            re-sign it with your own Apple ID.
